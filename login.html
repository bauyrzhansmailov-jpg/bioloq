<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioLoq — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #f5f0e8;
            --bg-card: #faf8f4;
            --accent-primary: #2d6a4f;
            --accent-secondary: #1b4332;
            --accent-warning: #d4820a;
            --text-primary: #1a1a2e;
            --text-secondary: #3d3d5c;
            --text-muted: #7a7a9a;
            --border: rgba(45, 106, 79, 0.2);
            --shadow: rgba(26, 26, 46, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(ellipse at 30% 20%, rgba(45,106,79,0.08) 0%, transparent 60%),
                              radial-gradient(ellipse at 70% 80%, rgba(27,67,50,0.06) 0%, transparent 60%);
        }

        .login-wrapper {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 4px 24px var(--shadow);
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.4rem;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.3rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: var(--bg-primary);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
        }

        input::placeholder { color: var(--text-muted); }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 0.5rem;
            letter-spacing: 0.3px;
        }

        .btn-login:hover  { opacity: 0.92; }
        .btn-login:active { transform: scale(0.99); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

        .error-msg {
            display: none;
            background: rgba(192, 57, 43, 0.1);
            border: 1px solid rgba(192, 57, 43, 0.3);
            color: #c0392b;
            border-radius: 8px;
            padding: 0.8rem 1rem;
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
        }

        .error-msg.show { display: block; }

        .hint {
            margin-top: 1.8rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .hint strong { color: var(--text-secondary); }

        .hint-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.3rem;
        }

        .role-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .role-badge.admin { background: rgba(212, 130, 10, 0.15); color: var(--accent-warning); }
        .role-badge.user  { background: rgba(45, 106, 79, 0.12);  color: var(--accent-primary); }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="logo">
            <img src="/icons/logo.png" alt="BioLoQ">
            <span>BioLoQ</span>
        </div>

        <div class="card">
            <div class="card-title">Welcome back</div>
            <div class="card-subtitle">Sign in to continue</div>

            <div class="error-msg" id="errorMsg"></div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
            </div>

            <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>

            <div class="hint">
                <div class="hint-row">
                    <span><strong>admin</strong> / admin123</span>
                    <span class="role-badge admin">Administrator</span>
                </div>
                <div class="hint-row">
                    <span><strong>user</strong> / user123</span>
                    <span class="role-badge user">Read-only</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // If already logged in, redirect
        const token = localStorage.getItem('authToken');
        if (token) {
            fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } })
                .then(r => r.json())
                .then(data => { if (data.username) window.location.href = '/'; })
                .catch(() => {});
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });

        async function doLogin() {
            const btn      = document.getElementById('loginBtn');
            const errorEl  = document.getElementById('errorMsg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Please enter both username and password.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing in…';
            errorEl.classList.remove('show');

            try {
                const res  = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Login failed.');
                    return;
                }

                localStorage.setItem('authToken', data.token);
                localStorage.setItem('authUser',  data.username);
                localStorage.setItem('authRole',  data.role);
                window.location.href = '/';

            } catch (err) {
                showError('Cannot connect to server. Is it running?');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
        }
    </script>
</body>
</html>
